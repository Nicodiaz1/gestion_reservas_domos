<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="admin-page">
    <header>
        <div class="container">
            <h1>⚙️ Panel Administrativo</h1>
            <a href="/admin/logout" class="btn btn-danger">Cerrar Sesión</a>
        </div>
    </header>

    <main class="container admin-container">
        <div class="sidebar">
            <nav>
                <button class="nav-btn active" data-tab="reservas">📋 Reservas</button>
                <button class="nav-btn" data-tab="canceladas">❌ Canceladas</button>
                <button class="nav-btn" data-tab="finalizadas">✅ Finalizadas</button>
                <button class="nav-btn" data-tab="pagos">💳 Pagos</button>
                <button class="nav-btn" data-tab="instrucciones">📄 Instrucciones PDF</button>
                <button class="nav-btn" data-tab="galeria">🖼️ Galería</button>
                <button class="nav-btn" data-tab="promociones">🏷️ Promociones</button>
            </nav>
        </div>

        <div class="content">
            <div class="filters-bar">
                <div class="filter-group">
                    <label for="filtro-fecha-inicio">Desde</label>
                    <input type="date" id="filtro-fecha-inicio">
                </div>
                <div class="filter-group">
                    <label for="filtro-fecha-fin">Hasta</label>
                    <input type="date" id="filtro-fecha-fin">
                </div>
                <div class="filter-group filter-search">
                    <label for="filtro-busqueda">Buscar cliente</label>
                    <input type="text" id="filtro-busqueda" placeholder="Nombre, email o teléfono">
                </div>
                <button class="btn btn-secondary" id="filtro-limpiar">Limpiar</button>
            </div>

            <!-- TAB: RESERVAS -->
            <div id="tab-reservas" class="tab-content active">
                <h2>Reservas Activas</h2>
                <div id="reservasContainer" class="reservas-list">
                    <p>Cargando...</p>
                </div>
            </div>

            <!-- TAB: CANCELADAS -->
            <div id="tab-canceladas" class="tab-content">
                <h2>Reservas Canceladas</h2>
                <div id="canceladasContainer" class="reservas-list">
                    <p>Cargando...</p>
                </div>
            </div>

            <!-- TAB: FINALIZADAS -->
            <div id="tab-finalizadas" class="tab-content">
                <h2>Reservas Finalizadas</h2>
                <div id="finalizadasContainer" class="reservas-list">
                    <p>Cargando...</p>
                </div>
            </div>

            <!-- TAB: PAGOS -->
            <div id="tab-pagos" class="tab-content">
                <h2>Pagos</h2>
                <div class="filters-bar" style="margin-bottom: 16px;">
                    <div class="filter-group">
                        <label for="filtro-pago-estado">Estado de pago</label>
                        <select id="filtro-pago-estado">
                            <option value="todos">Todos</option>
                            <option value="pagado">Pago completo</option>
                            <option value="parcial">Pago parcial</option>
                            <option value="pendiente">Pago sin registrar</option>
                        </select>
                    </div>
                    <div class="filter-group filter-search">
                        <label for="filtro-pago-busqueda">Buscar</label>
                        <input type="text" id="filtro-pago-busqueda" placeholder="Cliente, email o teléfono">
                    </div>
                    <button class="btn btn-secondary" id="filtro-pago-limpiar">Limpiar</button>
                </div>
                <div id="pagosContainer" class="reservas-list">
                    <p>Cargando...</p>
                </div>
            </div>

            <!-- TAB: INSTRUCCIONES PDF -->
            <div id="tab-instrucciones" class="tab-content">
                <h2>Instrucciones PDF</h2>
                <div class="card" style="margin-bottom: 16px;">
                    <h3 style="margin-bottom: 12px;">Subir nuevo PDF</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="doc-nombre">Nombre</label>
                            <input type="text" id="doc-nombre" placeholder="Ej: Instrucciones de ingreso">
                        </div>
                        <div class="form-group">
                            <label for="doc-descripcion">Descripción (opcional)</label>
                            <input type="text" id="doc-descripcion" placeholder="Versión 2026">
                        </div>
                        <div class="form-group">
                            <label for="doc-file">Archivo PDF</label>
                            <input type="file" id="doc-file" accept="application/pdf,.pdf">
                        </div>
                    </div>
                    <button class="btn btn-primary" id="doc-guardar">Subir PDF</button>
                </div>
                <div id="documentosContainer" class="reservas-list">
                    <p>Cargando...</p>
                </div>
            </div>

            <!-- TAB: GALERIA -->
            <div id="tab-galeria" class="tab-content">
                <h2>Galería</h2>
                <div class="card" style="margin-bottom: 16px;">
                    <h3 style="margin-bottom: 12px;">Agregar foto</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="galeria-url">URL de la imagen</label>
                            <input type="text" id="galeria-url" placeholder="https://...">
                        </div>
                        <div class="form-group">
                            <label for="galeria-file">Subir imagen</label>
                            <input type="file" id="galeria-file" accept="image/*">
                        </div>
                        <div class="form-group">
                            <label for="galeria-titulo">Título (opcional)</label>
                            <input type="text" id="galeria-titulo" placeholder="Descripción corta">
                        </div>
                        <div class="form-group">
                            <label for="galeria-orden">Orden</label>
                            <input type="number" id="galeria-orden" value="0" min="0">
                        </div>
                    </div>
                    <button class="btn btn-primary" id="galeria-guardar">Guardar foto</button>
                </div>
                <div id="galeria-admin-list" class="reservas-list">
                    <p>Cargando...</p>
                </div>
            </div>

            <!-- TAB: PROMOCIONES -->
            <div id="tab-promociones" class="tab-content">
                <h2>Promociones</h2>
                <div class="card" style="margin-bottom: 16px;">
                    <h3 style="margin-bottom: 12px;">Agregar promoción</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="promo-titulo">Título</label>
                            <input type="text" id="promo-titulo" placeholder="Ej: 2x1 en semana">
                        </div>
                        <div class="form-group">
                            <label for="promo-imagen-url">URL de imagen (opcional)</label>
                            <input type="text" id="promo-imagen-url" placeholder="https://...">
                        </div>
                        <div class="form-group">
                            <label for="promo-imagen">Subir imagen</label>
                            <input type="file" id="promo-imagen" accept="image/*">
                        </div>
                        <div class="form-group">
                            <label for="promo-detalle">Detalle (opcional)</label>
                            <input type="text" id="promo-detalle" placeholder="Ej: Válido hasta 30/06">
                        </div>
                        <div class="form-group">
                            <label for="promo-orden">Orden</label>
                            <input type="number" id="promo-orden" value="0" min="0">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="promo-descripcion">Descripción</label>
                        <textarea id="promo-descripcion" rows="3" placeholder="Descripción de la promo"></textarea>
                    </div>
                    <button class="btn btn-primary" id="promo-guardar">Guardar promoción</button>
                </div>
                <div id="promos-admin-list" class="reservas-list">
                    <p>Cargando...</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Cambiar tabs
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
                this.classList.add('active');
                document.getElementById('tab-' + this.dataset.tab).classList.add('active');
            });
        });

        // ========== RESERVAS ==========
        let reservasCache = [];

        function normalizarTexto(valor) {
            return (valor || '').toString().toLowerCase().trim();
        }

        function filtrarReservas(lista) {
            const fechaInicioFiltro = document.getElementById('filtro-fecha-inicio').value;
            const fechaFinFiltro = document.getElementById('filtro-fecha-fin').value;
            const busqueda = normalizarTexto(document.getElementById('filtro-busqueda').value);

            const filtroInicio = fechaInicioFiltro ? new Date(fechaInicioFiltro) : null;
            const filtroFin = fechaFinFiltro ? new Date(fechaFinFiltro) : null;

            return lista.filter(r => {
                const inicio = new Date(r.fecha_inicio);
                const fin = new Date(r.fecha_fin);

                const coincideTexto = !busqueda || [
                    normalizarTexto(r.nombre_cliente),
                    normalizarTexto(r.email_cliente),
                    normalizarTexto(r.telefono_cliente),
                    normalizarTexto(r.domo_nombre)
                ].some(valor => valor.includes(busqueda));

                let coincideFecha = true;
                if (filtroInicio && filtroFin) {
                    coincideFecha = fin >= filtroInicio && inicio <= filtroFin;
                } else if (filtroInicio) {
                    coincideFecha = fin >= filtroInicio;
                } else if (filtroFin) {
                    coincideFecha = inicio <= filtroFin;
                }

                return coincideTexto && coincideFecha;
            });
        }

        function renderReservas() {
            const hoy = new Date();
            hoy.setHours(0, 0, 0, 0);

            const activas = [];
            const canceladas = [];
            const finalizadas = [];

            filtrarReservas(reservasCache).forEach(r => {
                const fechaFin = new Date(r.fecha_fin);
                if (r.estado === 'cancelada') {
                    canceladas.push(r);
                } else if (fechaFin < hoy) {
                    finalizadas.push(r);
                } else {
                    activas.push(r);
                }
            });

            const activasHtml = activas.map(r => buildReservaCard(r, { canCancel: true })).join('');
            const canceladasHtml = canceladas.map(r => buildReservaCard(r, { canDelete: true })).join('');
            const finalizadasHtml = finalizadas.map(r => buildReservaCard(r, { canDelete: true })).join('');

            document.getElementById('reservasContainer').innerHTML = activasHtml || '<p>Sin reservas activas</p>';
            document.getElementById('canceladasContainer').innerHTML = canceladasHtml || '<p>Sin reservas canceladas</p>';
            document.getElementById('finalizadasContainer').innerHTML = finalizadasHtml || '<p>Sin reservas finalizadas</p>';
        }

        function buildReservaCard(r, options = {}) {
            const actions = [];
            if (options.canCancel && r.estado === 'confirmada') {
                actions.push(`<button class="btn btn-danger" onclick="cancelarReserva(${r.id})">Cancelar</button>`);
            }
            if (options.canDelete) {
                actions.push(`<button class="btn btn-secondary" onclick="eliminarReserva(${r.id})">Eliminar</button>`);
            }

            // Etiquetas para tipo_check
            const tipoCheckLabels = {
                'normal': 'Normal',
                'early_checkin': 'Early Check-in',
                'late_checkout': 'Late Checkout'
            };
            
            // Dropdown para cambiar tipo_check en reservas activas
            let tipoCheckHTML = '';
            if (options.canCancel && r.estado === 'confirmada') {
                tipoCheckHTML = `
                    <div style="margin-top: 12px;">
                        <label style="font-size: 13px; font-weight: 600; margin-bottom: 4px; display: block;">Tipo de Check:</label>
                        <select onchange="cambiarTipoCheck(${r.id}, this.value)" style="padding: 6px 10px; border-radius: 6px; border: 1px solid #ddd; font-size: 13px; width: 100%;">
                            <option value="normal" ${r.tipo_check === 'normal' ? 'selected' : ''}>Normal</option>
                            <option value="early_checkin" ${r.tipo_check === 'early_checkin' ? 'selected' : ''}>Early Check-in</option>
                            <option value="late_checkout" ${r.tipo_check === 'late_checkout' ? 'selected' : ''}>Late Checkout</option>
                        </select>
                    </div>
                `;
            } else {
                // Solo mostrar el tipo en reservas no activas
                tipoCheckHTML = `<p><strong>Tipo:</strong> ${tipoCheckLabels[r.tipo_check] || 'Normal'}</p>`;
            }

            return `
                <div class="reserva-card">
                    <div class="reserva-header">
                        <h3>${r.domo_nombre}</h3>
                        <span class="status ${r.estado}">${r.estado}</span>
                    </div>
                    <div class="reserva-body">
                        <p><strong>Cliente:</strong> ${r.nombre_cliente}</p>
                        <p><strong>Email:</strong> ${r.email_cliente || 'N/A'}</p>
                        <p><strong>Teléfono:</strong> ${r.telefono_cliente || 'N/A'}</p>
                        <p><strong>Fechas:</strong> ${r.fecha_inicio} a ${r.fecha_fin}</p>
                        ${tipoCheckHTML}
                    </div>
                    ${actions.length ? `<div class="reserva-actions">${actions.join('')}</div>` : ''}
                </div>
            `;
        }

        async function cargarReservas() {
            try {
                const res = await fetch('/api/admin/reservas');
                reservasCache = await res.json();
                renderReservas();
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function cancelarReserva(reservaId) {
            if (!confirm('¿Cancelar esta reserva?')) return;
            try {
                const res = await fetch(`/api/admin/reserva/${reservaId}`, { method: 'DELETE' });
                const data = await res.json();
                if (res.ok) {
                    cargarReservas();
                    alert('Reserva cancelada');
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function cambiarTipoCheck(reservaId, tipoCheck) {
            try {
                const res = await fetch(`/api/admin/reserva/${reservaId}/tipo_check`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tipo_check: tipoCheck })
                });
                const data = await res.json();
                if (res.ok) {
                    cargarReservas();
                } else {
                    alert(data.error || 'Error al actualizar');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error al actualizar tipo de check');
            }
        }

        async function eliminarReserva(reservaId) {
            if (!confirm('¿Eliminar definitivamente esta reserva?')) return;
            try {
                const res = await fetch(`/api/admin/reserva/${reservaId}/eliminar`, { method: 'DELETE' });
                const data = await res.json();
                if (res.ok) {
                    cargarReservas();
                    alert('Reserva eliminada');
                } else {
                    alert(data.error || 'No se pudo eliminar');
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        document.getElementById('filtro-fecha-inicio').addEventListener('change', renderReservas);
        document.getElementById('filtro-fecha-fin').addEventListener('change', renderReservas);
        document.getElementById('filtro-busqueda').addEventListener('input', renderReservas);
        document.getElementById('filtro-limpiar').addEventListener('click', () => {
            document.getElementById('filtro-fecha-inicio').value = '';
            document.getElementById('filtro-fecha-fin').value = '';
            document.getElementById('filtro-busqueda').value = '';
            renderReservas();
        });

        async function subirArchivo(endpoint, file) {
            const formData = new FormData();
            formData.append('file', file);
            const res = await fetch(endpoint, { method: 'POST', body: formData });
            if (!res.ok) {
                const data = await res.json();
                throw new Error(data.error || 'Error subiendo archivo');
            }
            const data = await res.json();
            return data.url;
        }

        // ========== GALERIA ==========
        async function cargarGaleriaAdmin() {
            try {
                const res = await fetch('/api/admin/galeria');
                const data = await res.json();
                const html = data.map(f => `
                    <div class="reserva-card">
                        <div class="reserva-header">
                            <h3>${f.titulo || 'Foto sin título'}</h3>
                        </div>
                        <div class="reserva-body">
                            <p><strong>Orden:</strong> ${f.orden}</p>
                            <p style="word-break: break-all;"><strong>URL:</strong> ${f.url}</p>
                        </div>
                        <div class="reserva-actions">
                            <button class="btn btn-secondary" onclick="eliminarFoto(${f.id})">Eliminar</button>
                        </div>
                    </div>
                `).join('');
                document.getElementById('galeria-admin-list').innerHTML = html || '<p>Sin fotos cargadas</p>';
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function eliminarFoto(fotoId) {
            if (!confirm('¿Eliminar esta foto?')) return;
            const res = await fetch(`/api/admin/galeria/${fotoId}`, { method: 'DELETE' });
            if (res.ok) cargarGaleriaAdmin();
        }

        document.getElementById('galeria-guardar').addEventListener('click', async () => {
            const urlInput = document.getElementById('galeria-url').value.trim();
            const fileInput = document.getElementById('galeria-file');
            const titulo = document.getElementById('galeria-titulo').value.trim();
            const orden = document.getElementById('galeria-orden').value || 0;

            let url = urlInput;
            if (!url && fileInput.files.length) {
                try {
                    url = await subirArchivo('/api/admin/galeria/upload', fileInput.files[0]);
                } catch (error) {
                    return alert(error.message);
                }
            }

            if (!url) return alert('URL o archivo requerido');

            const res = await fetch('/api/admin/galeria', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url, titulo, orden })
            });
            if (res.ok) {
                document.getElementById('galeria-url').value = '';
                document.getElementById('galeria-titulo').value = '';
                document.getElementById('galeria-orden').value = 0;
                fileInput.value = '';
                cargarGaleriaAdmin();
            }
        });

        // ========== PROMOCIONES ==========
        async function cargarPromosAdmin() {
            try {
                const res = await fetch('/api/admin/promociones');
                const data = await res.json();
                const html = data.map(p => `
                    <div class="reserva-card">
                        <div class="reserva-header">
                            <h3>${p.titulo}</h3>
                            <span class="status ${p.activo ? 'confirmada' : 'cancelada'}">${p.activo ? 'activa' : 'inactiva'}</span>
                        </div>
                        <div class="reserva-body">
                            ${p.image_url ? `<img src="${p.image_url}" alt="${p.titulo}" style="width: 100%; border-radius: 12px; margin-bottom: 10px;">` : ''}
                            <p>${p.descripcion}</p>
                            ${p.detalle ? `<p><strong>Detalle:</strong> ${p.detalle}</p>` : ''}
                            <p><strong>Orden:</strong> ${p.orden}</p>
                        </div>
                        <div class="reserva-actions">
                            <button class="btn btn-secondary" onclick="eliminarPromo(${p.id})">Eliminar</button>
                        </div>
                    </div>
                `).join('');
                document.getElementById('promos-admin-list').innerHTML = html || '<p>Sin promociones</p>';
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function eliminarPromo(promoId) {
            if (!confirm('¿Eliminar esta promoción?')) return;
            const res = await fetch(`/api/admin/promociones/${promoId}`, { method: 'DELETE' });
            if (res.ok) cargarPromosAdmin();
        }

        document.getElementById('promo-guardar').addEventListener('click', async () => {
            const titulo = document.getElementById('promo-titulo').value.trim();
            const descripcion = document.getElementById('promo-descripcion').value.trim();
            const detalle = document.getElementById('promo-detalle').value.trim();
            const orden = document.getElementById('promo-orden').value || 0;
            const imagenUrlInput = document.getElementById('promo-imagen-url').value.trim();
            const imagenFileInput = document.getElementById('promo-imagen');

            if (!titulo || !descripcion) return alert('Título y descripción requeridos');

            let image_url = imagenUrlInput;
            if (!image_url && imagenFileInput.files.length) {
                try {
                    image_url = await subirArchivo('/api/admin/promociones/upload', imagenFileInput.files[0]);
                } catch (error) {
                    return alert(error.message);
                }
            }

            const res = await fetch('/api/admin/promociones', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ titulo, descripcion, detalle, orden, image_url })
            });
            if (res.ok) {
                document.getElementById('promo-titulo').value = '';
                document.getElementById('promo-descripcion').value = '';
                document.getElementById('promo-detalle').value = '';
                document.getElementById('promo-orden').value = 0;
                document.getElementById('promo-imagen-url').value = '';
                imagenFileInput.value = '';
                cargarPromosAdmin();
            }
        });

        // ========== PAGOS ==========
        let pagosAdminCache = [];

        function pagosFiltrados() {
            const estado = document.getElementById('filtro-pago-estado').value;
            const q = (document.getElementById('filtro-pago-busqueda').value || '').toLowerCase().trim();

            return pagosAdminCache.filter(p => {
                const okEstado = estado === 'todos' || (p.estado_pago || 'pendiente') === estado;
                const texto = `${p.nombre_cliente || ''} ${p.email_cliente || ''} ${p.telefono_cliente || ''}`.toLowerCase();
                const okBusqueda = !q || texto.includes(q);
                return okEstado && okBusqueda;
            });
        }

        function renderPagosAdmin() {
            const data = pagosFiltrados();
            const html = data.map(p => {
                const montoTotal = Number(p.monto_a_pagar || 0);
                const montoPagado = Number(p.monto_pagado || 0);
                const pendiente = montoTotal - montoPagado;
                const estadoPago = p.estado_pago || 'pendiente';

                return `
                    <div class="reserva-card">
                        <div class="reserva-header">
                            <h3>${p.domo_nombre}</h3>
                            <span class="status ${estadoPago === 'pagado' ? 'confirmada' : 'cancelada'}">${estadoPago}</span>
                        </div>
                        <div class="reserva-body">
                            <p><strong>Cliente:</strong> ${p.nombre_cliente}</p>
                            <p><strong>Email:</strong> ${p.email_cliente || 'N/A'}</p>
                            <p><strong>Teléfono:</strong> ${p.telefono_cliente || 'N/A'}</p>
                            <p><strong>Fechas:</strong> ${p.fecha_inicio} a ${p.fecha_fin}</p>
                            <p><strong>Instrucciones enviadas:</strong> ${p.instrucciones_enviadas ? 'Sí' : 'No'}</p>
                        </div>
                        <div class="reserva-body" style="border-top:1px solid #eee; margin-top:10px; padding-top:10px;">
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Monto acordado</label>
                                    <input type="number" step="0.01" id="pago-total-${p.reserva_id}" value="${montoTotal}">
                                </div>
                                <div class="form-group">
                                    <label>Monto pagado</label>
                                    <input type="number" step="0.01" id="pago-pagado-${p.reserva_id}" value="${montoPagado}">
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Nota de pago</label>
                                <input type="text" id="pago-nota-${p.reserva_id}" value="${p.nota_pago || ''}" placeholder="Opcional">
                            </div>
                            <p><strong>Pendiente:</strong> $${pendiente.toFixed(2)}</p>
                        </div>
                        <div class="reserva-actions" style="flex-wrap:wrap; gap:8px;">
                            <button class="btn btn-primary" onclick="guardarPagoInline(${p.reserva_id})">Guardar pago</button>
                            <select id="canal-${p.reserva_id}" style="padding:8px 10px; border-radius:8px; border:1px solid #ddd;">
                                <option value="whatsapp">WhatsApp</option>
                                <option value="email">Email</option>
                            </select>
                            <input type="text" id="mensaje-${p.reserva_id}" placeholder="Mensaje opcional" style="flex:1; min-width:180px; padding:8px 10px; border-radius:8px; border:1px solid #ddd;">
                            <button class="btn btn-secondary" onclick="enviarInstruccionesInline(${p.reserva_id})">Enviar instrucciones</button>
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('pagosContainer').innerHTML = html || '<p>Sin reservas para mostrar</p>';
        }

        async function cargarPagosAdmin() {
            try {
                const res = await fetch('/api/admin/pagos');
                const data = await res.json();
                pagosAdminCache = Array.isArray(data) ? data : [];
                renderPagosAdmin();
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('pagosContainer').innerHTML = '<p>Error cargando pagos</p>';
            }
        }

        async function guardarPagoInline(reservaId) {
            const monto_a_pagar = Number(document.getElementById(`pago-total-${reservaId}`).value || 0);
            const monto_pagado = Number(document.getElementById(`pago-pagado-${reservaId}`).value || 0);
            const nota_pago = (document.getElementById(`pago-nota-${reservaId}`).value || '').trim();

            try {
                const res = await fetch(`/api/admin/pagos/${reservaId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ monto_a_pagar, monto_pagado, nota_pago })
                });
                const data = await res.json();
                if (!res.ok) {
                    alert(data.error || 'No se pudo actualizar el pago');
                    return;
                }
                cargarPagosAdmin();
            } catch (error) {
                console.error('Error:', error);
                alert('Error actualizando pago');
            }
        }

        async function enviarInstruccionesInline(reservaId) {
            const canal = (document.getElementById(`canal-${reservaId}`).value || 'whatsapp').toLowerCase();
            const mensaje = (document.getElementById(`mensaje-${reservaId}`).value || '').trim();

            try {
                const res = await fetch(`/api/admin/instrucciones/enviar/${reservaId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ canal, mensaje })
                });
                const data = await res.json();
                if (!res.ok) {
                    alert(data.error || 'No se pudo generar el envío');
                    return;
                }
                if (data.url) window.open(data.url, '_blank');
                cargarPagosAdmin();
            } catch (error) {
                console.error('Error:', error);
                alert('Error enviando instrucciones');
            }
        }

        document.getElementById('filtro-pago-estado').addEventListener('change', renderPagosAdmin);
        document.getElementById('filtro-pago-busqueda').addEventListener('input', renderPagosAdmin);
        document.getElementById('filtro-pago-limpiar').addEventListener('click', () => {
            document.getElementById('filtro-pago-estado').value = 'todos';
            document.getElementById('filtro-pago-busqueda').value = '';
            renderPagosAdmin();
        });

        // ========== DOCUMENTOS INSTRUCCIONES ==========
        async function cargarDocumentosInstrucciones() {
            try {
                const res = await fetch('/api/admin/documentos-instrucciones');
                const data = await res.json();
                const html = data.map(d => `
                    <div class="reserva-card">
                        <div class="reserva-header">
                            <h3>${d.nombre}</h3>
                            <span class="status ${d.activo ? 'confirmada' : 'cancelada'}">${d.activo ? 'activo' : 'inactivo'}</span>
                        </div>
                        <div class="reserva-body">
                            <p><strong>Descripción:</strong> ${d.descripcion || 'N/A'}</p>
                            <p><a href="/api/documentos-instrucciones/${d.id}/archivo" target="_blank">Ver PDF</a></p>
                        </div>
                        <div class="reserva-actions">
                            <button class="btn btn-primary" onclick="activarDocumento(${d.id})">Activar</button>
                            <button class="btn btn-secondary" onclick="eliminarDocumento(${d.id})">Eliminar</button>
                        </div>
                    </div>
                `).join('');
                document.getElementById('documentosContainer').innerHTML = html || '<p>Sin PDFs cargados</p>';
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('documentosContainer').innerHTML = '<p>Error cargando documentos</p>';
            }
        }

        document.getElementById('doc-guardar').addEventListener('click', async () => {
            const nombre = document.getElementById('doc-nombre').value.trim();
            const descripcion = document.getElementById('doc-descripcion').value.trim();
            const file = document.getElementById('doc-file').files[0];

            if (!nombre || !file) {
                alert('Nombre y archivo PDF requeridos');
                return;
            }

            const formData = new FormData();
            formData.append('nombre', nombre);
            formData.append('descripcion', descripcion);
            formData.append('file', file);

            try {
                const res = await fetch('/api/admin/documentos-instrucciones', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                if (!res.ok) {
                    alert(data.error || 'No se pudo subir el PDF');
                    return;
                }

                document.getElementById('doc-nombre').value = '';
                document.getElementById('doc-descripcion').value = '';
                document.getElementById('doc-file').value = '';
                cargarDocumentosInstrucciones();
            } catch (error) {
                console.error('Error:', error);
                alert('Error subiendo PDF');
            }
        });

        async function activarDocumento(documentoId) {
            try {
                const res = await fetch(`/api/admin/documentos-instrucciones/${documentoId}/activar`, { method: 'PUT' });
                const data = await res.json();
                if (!res.ok) {
                    alert(data.error || 'No se pudo activar el PDF');
                    return;
                }
                cargarDocumentosInstrucciones();
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function eliminarDocumento(documentoId) {
            if (!confirm('¿Eliminar este PDF?')) return;
            try {
                const res = await fetch(`/api/admin/documentos-instrucciones/${documentoId}`, { method: 'DELETE' });
                const data = await res.json();
                if (!res.ok) {
                    alert(data.error || 'No se pudo eliminar el PDF');
                    return;
                }
                cargarDocumentosInstrucciones();
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // Cargar datos al iniciar
        cargarReservas();
        cargarPagosAdmin();
        cargarDocumentosInstrucciones();
        cargarGaleriaAdmin();
        cargarPromosAdmin();
    </script>
</body>
</html>
